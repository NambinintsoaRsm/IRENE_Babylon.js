<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon GUI from JSON</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;

        }

        @font-face {
            font-family: "Luciole";
            src: url("assets/fonts/Luciole/Luciole-Regular.woff2") format("woff2");
            font-weight: 400;
        }

        @font-face {
            font-family: "Luciole";
            src: url("assets/fonts/Luciole/Luciole-Bold.woff2") format("woff2");
            font-weight: 700;
        }

        @font-face {
            font-family: "OpenDyslexic";
            src: url("assets/fonts/OpenDyslexic/OpenDyslexic-Regular.woff2") format("woff2");
            font-weight: 400;
        }

        @font-face {
            font-family: "OpenDyslexic";
            src: url("assets/fonts/OpenDyslexic/OpenDyslexic-Bold.woff2") format("woff2");
            font-weight: 700;
        }

        @font-face {
            font-family: "Tiresias";
            src: url("assets/fonts/Tiresias-Infofont/Tiresias_Infofont.ttf") format("ttf");
            font-weight: 400;
        }
        @font-face {
            font-family: "Liberation";
            src: url("assets/fonts/Liberation/liberationsans-regular-webfont.woff2") format("woff2");
            font-weight: 400;
        }
        @font-face {
            font-family: "Liberation";
            src: url("assets/fonts/Liberation/liberationsans-regular-webfont.woff2") format("woff2");
            font-weight: 400;
        }


    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>


<script type="module" src="main.js"></script>
</body>
</html>
